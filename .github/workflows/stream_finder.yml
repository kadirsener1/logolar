name: Vavoo Stream Finder

on:
  schedule:
    - cron: '0 */6 * * *'  # Her 6 saatte bir
  workflow_dispatch:  # Manuel tetikleme

jobs:
  find-streams:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v3
    
    - name: Python Kur
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Bağımlılıkları Kur
      run: pip install requests
    
    - name: Stream Bul
      run: python vavoo_stream_finder.py
    
    - name: M3U Dosyasını Commit Et
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add vavoo_streams.m3u
        git diff --staged --quiet || git commit -m "M3U güncellendi: $(date '+%Y-%m-%d %H:%M')"
        git push
