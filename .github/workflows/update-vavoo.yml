name: Update Vavoo Playlist

on:
  schedule:
    - cron: '15 * * * *'      # Her saat 15 dakikada bir (daha az çakışma için)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-22.04        # Daha hızlı queue için 22.04 kullanıyoruz
    timeout-minutes: 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Update Script
        run: python update_playlist.py

      - name: Commit & Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update Vavoo m3u8 link"
          file_pattern: playlist.m3u
